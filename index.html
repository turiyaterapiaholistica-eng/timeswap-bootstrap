<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TimeSwap Live</title>
    <meta http-equiv="refresh" content="1;url=https://forgot-productions-generated-serious.trycloudflare.com" />
    <meta name="robots" content="noindex" />
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --accent: #0f766e;
        --border: #dbe4f0;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(20, 184, 166, 0.14), transparent 30%),
          linear-gradient(180deg, var(--bg) 0%, #eef2ff 100%);
        font: 16px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
      }
      main {
        width: min(100%, 560px);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 28px;
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.12);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        line-height: 1.1;
      }
      p { margin: 0; color: var(--muted); }
      .stack { margin-top: 20px; display: grid; gap: 14px; }
      .panel {
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 16px;
        background: #f8fafc;
      }
      .label {
        display: block;
        margin-bottom: 6px;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent);
        font-weight: 700;
      }
      .link {
        word-break: break-word;
        color: var(--text);
        font-weight: 600;
      }
      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-top: 18px;
        padding: 12px 16px;
        border-radius: 14px;
        background: var(--text);
        color: #fff;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>TimeSwap Live</h1>
      <p>Redirecionando para a sessão pública mais recente...</p>
      <div class="stack">
        <div class="panel">
          <span class="label">Link público atual</span>
          <div class="link">https://forgot-productions-generated-serious.trycloudflare.com</div>
        </div>
        <div class="panel">
          <span class="label">Sessão publicada em</span>
          <div class="link">2026-04-28T22:05:05Z</div>
        </div>
      </div>
      <a class="button" href="https://forgot-productions-generated-serious.trycloudflare.com">Abrir TimeSwap</a>
    </main>
  </body>
  </html>
